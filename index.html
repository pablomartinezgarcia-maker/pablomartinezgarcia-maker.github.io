<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pizarra Profe Pablo | Conectando...</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h2 { color: var(--accent); margin-bottom: 0.5rem; }
        p { opacity: 0.8; margin-bottom: 2rem; }

        .timer-box {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            border: 4px solid var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .btn {
            background-color: var(--accent);
            color: var(--bg);
            text-decoration: none;
            padding: 1rem 2rem;
            border-radius: 0.5rem;
            font-weight: bold;
            font-size: 1.1rem;
            display: inline-block;
            transition: transform 0.2s, background 0.2s;
        }
        .btn:hover {
            transform: scale(1.05);
            background-color: #7dd3fc;
        }
        .footer-text {
            margin-top: 2rem;
            font-size: 0.85rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Pizarra Online</h2>
        <p>Laboratorio de Informática - Redirigiendo tráfico...</p>

        <div class="timer-box" id="counter">10</div>

        <a href="https://api.trycloudflare.com" class="btn">Entrar Manualmente</a>

        <p class="footer-text">
            Si la redirección automática falla, haz clic en el botón superior.
        </p>
    </div>

    <script>
        let timeLeft = 10;
        const counterElement = document.getElementById('counter');
        const targetUrl = "https://api.trycloudflare.com";

        const countdown = setInterval(() => {
            timeLeft--;
            counterElement.innerText = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                window.location.replace(targetUrl);
            }
        }, 1000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Profe Pablo</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #0f172a;
        }
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #38bdf8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 1.5rem;
            font-weight: bold;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="loading">Cargando el laboratorio virtual...</div>
    <iframe src="https://preliminary-barely-antenna-weekend.trycloudflare.com" allowfullscreen="true" allow="camera; microphone; display-capture"></iframe>
</body>
</html>
